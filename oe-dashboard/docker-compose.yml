services:
  gatus:
    image: twinproduction/gatus
    container_name: gatus
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/config/config.yaml
    networks:
      - default
      - test_default

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    ports:
      - "9999:8080"
    environment:
      - DOZZLE_FILTER=name=cipherstream
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

networks:
  test_default:
    external: true
