name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm ci || npm install

      - name: Lint Frontend
        working-directory: ./client
        run: npm run lint

      - name: Test Frontend
        working-directory: ./client
        run: npm test

      - name: Install Backend Dependencies
        working-directory: ./server
        run: npm ci || npm install

      - name: Lint Backend
        working-directory: ./server
        run: npm run lint --preserve-symlinks || true # Allow failure if config is bare minimum

      - name: Test Backend
        working-directory: ./server
        run: npm test

  build-docker-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: task-manager-frontend:latest

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: task-manager-backend:latest
